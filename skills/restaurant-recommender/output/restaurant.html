<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>餐厅排名推荐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F1;
  --card-bg: #ffffff;
  --card-hover: #f3f2ef;
  --text: #1A1A18;
  --text-secondary: #595957;
  --muted: #8F8F8D;
  --accent: #3A7D68;
  --accent-hover: #52A688;
  --accent-soft: #E8F2EE;
  --amber: #D4920A;
  --red: #D94F3D;
  --sky: #3B87CC;
  --sky-soft: #eaf3fb;
  --border: #EBEBEA;
  --hairline: #f0efec;
  --gold: #C8922B;
  --gold-soft: #fdf3e0;
  --silver: #8A8D91;
  --silver-soft: #f2f3f4;
  --bronze: #B87D4B;
  --bronze-soft: #faf2eb;
  --shadow-sm: 0 1px 3px rgba(58,125,104,.06);
  --shadow-md: 0 4px 16px rgba(58,125,104,.08);
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  max-width: 620px;
  margin: 0 auto;
}

/* === 头部 === */
header {
  background: var(--accent);
  color: #fff;
  padding: 28px 20px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}
header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
  text-wrap: balance;
}
header .meta {
  font-size: 14px;
  opacity: .8;
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  font-family: 'Outfit', -apple-system, sans-serif;
  font-weight: 500;
  letter-spacing: 0.01em;
}
header .meta span { display: inline-flex; align-items: center; gap: 5px; }

/* === 预算切换 === */
.budget-bar {
  margin: 18px 14px 18px;
  display: flex;
  gap: 6px;
}
.budget-bar button {
  flex: 1;
  padding: 10px 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;
  font-weight: 600;
  color: var(--text-secondary);
}
.budget-bar button:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}
.budget-bar button.active-budget {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

/* === 排名区域标题 === */
.ranking-header {
  margin: 0 14px 14px;
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ranking-header .count {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  margin-left: auto;
}

/* === 餐厅排名卡片 === */
.ranking-list {
  margin: 0 14px 18px;
}
.restaurant-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--hairline);
  box-shadow: var(--shadow-sm);
  padding: 16px 18px;
  margin-bottom: 12px;
  transition: box-shadow .2s, transform .2s;
  position: relative;
}
.restaurant-card:hover { box-shadow: var(--shadow-md); }
.restaurant-card:last-child { margin-bottom: 0; }

/* 排名徽章 */
.rank-badge {
  position: absolute;
  top: -8px;
  left: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  z-index: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.rank-1 { background: linear-gradient(135deg, #f5cd6d, #c8922b); }
.rank-2 { background: linear-gradient(135deg, #c0c4c9, #8a8d91); }
.rank-3 { background: linear-gradient(135deg, #d4a87c, #b87d4b); }
.rank-rest { background: var(--accent); }

/* 卡片头部 */
.card-header {
  padding-left: 24px;
  margin-bottom: 10px;
}
.card-header .name {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.3;
  text-wrap: balance;
}
.card-header .subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* 评分多维展示 */
.score-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.score-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  background: var(--hairline);
  color: var(--text-secondary);
}
.score-chip.star { background: var(--gold-soft); color: var(--gold); }
.score-chip.hot { background: var(--red); color: #fff; }
.score-chip.hot-mild { background: #fde8ee; color: #d44a6e; }
.score-chip.rank { background: var(--accent-soft); color: var(--accent); }

/* 必点菜 */
.must-try {
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  font-size: 14px;
  line-height: 1.5;
}
.must-try .label {
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
  font-size: 13px;
}
.must-try .dishes { color: var(--text-secondary); }

/* 置信度标签 */
.conf-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.conf-high { background: var(--accent-soft); color: var(--accent); }
.conf-medium { background: #fef3c7; color: var(--amber); }
.conf-low { background: #fde8ee; color: var(--red); }

/* 聚合卡片 */
.agg-card {
  background: #fafaf9;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
  padding: 10px 12px;
  margin-top: 10px;
}
.agg-card .source-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid var(--hairline);
  font-size: 14px;
  line-height: 1.5;
}
.agg-card .source-row:last-child { border-bottom: none; }
.agg-card .source-icon {
  font-size: 15px;
  min-width: 20px;
  text-align: center;
  opacity: .8;
}
.agg-card .source-content { flex: 1; }
.agg-card .source-stats {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
}

/* 特色标签 */
.features {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.features span {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--hairline);
  color: var(--muted);
}

/* 链接行 */
.link-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.link-row a {
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: 600;
  transition: all .2s;
  letter-spacing: 0.02em;
}
.link-row a:hover { transform: translateY(-1px); }
.link-row a:active { transform: scale(0.97); }
.link-dianping { background: var(--accent-soft); color: var(--accent); }
.link-dianping:hover { background: #d6ede4; }
.link-bilibili { background: #fde8ee; color: #d44a6e; }
.link-bilibili:hover { background: #fddae4; }
.link-xhs { background: #ffe8e8; color: #d43939; }
.link-xhs:hover { background: #ffdbdb; }
.link-weixin { background: #eaf3e8; color: #3d7a43; }
.link-weixin:hover { background: #d8ebd6; }

/* === 餐厅表格 === */
.table-wrap {
  margin: 0 14px 18px;
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--hairline);
  box-shadow: var(--shadow-sm);
}
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  min-width: 420px;
}
.table-wrap th {
  background: #f3f2ef;
  padding: 10px 10px;
  text-align: left;
  font-weight: 700;
  font-size: 14px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.table-wrap td { padding: 10px 10px; border-bottom: 1px solid var(--hairline); }
.table-wrap tr:hover td { background: var(--card-hover); }
.table-wrap tr:last-child td { border-bottom: none; }
.conf-high { color: var(--accent); font-weight: 700; }
.conf-medium { color: var(--amber); }

/* === 页脚 === */
footer {
  margin: 24px 14px 32px;
  padding: 14px 0 0;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  border-top: 1px solid var(--hairline);
}
footer div + div { margin-top: 4px; }

/* === 响应式 === */
@media (min-width: 640px) {
  body { padding: 0 0 40px; }
  header { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
}

/* === 数据占位（无数据时的优雅降级） === */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 15px;
}
</style>
</head>

    var scoreHtml = '';
    if (scoring.dianping) {
      scoreHtml += '<div class="score-chip star">&starf; 点评 ' + scoring.dianping + '</div>';
    }
    if (scoring.amap) {
      scoreHtml += '<div class="score-chip star">&starf; 高德 ' + scoring.amap + '</div>';
    }
    if (scoring.bangdan_rank) {
      scoreHtml += '<div class="score-chip rank">🏆 状元榜 #' + scoring.bangdan_rank + '</div>';
    }
    if (scoring.bangdan_score) {
      scoreHtml += '<div class="score-chip">🏆 状元榜 ' + scoring.bangdan_score + '</div>';
    }
    if (scoring.xhs_likes) {
      var xhsLabel = scoring.xhs_likes > 500 ? 'hot' : 'hot-mild';
      scoreHtml += '<div class="score-chip ' + xhsLabel + '">&#9829; 小红书 ' + formatNumber(scoring.xhs_likes) + '</div>';
    }
    if (scoring.bilibili && scoring.bilibili.views) {
      scoreHtml += '<div class="score-chip hot-mild">&#9654; B站 ' + formatViews(scoring.bilibili.views) + '</div>';
    }
    if (scoring.weixin) {
      scoreHtml += '<div class="score-chip">&#9998; 公众号</div>';
    }
    var scoreGridHtml = scoreHtml ? '<div class="score-grid">' + scoreHtml + '</div>' : '';

    // Must try
    var mustTryHtml = '';
    if (mustTry.length > 0) {
      mustTryHtml = '<div class="must-try"><span class="label">必点菜</span><span class="dishes">' + mustTry.join('、') + '</span></div>';
    }

    // Features
    var featuresHtml = '';
    if (features.length > 0) {
      featuresHtml = '<div class="features">' +
        features.map(function(f) { return '<span>' + f + '</span>'; }).join('') +
        '</div>';
    }

    // Aggregation card (multi-source details)
    var aggHtml = '';
    if (scoring.dianping || scoring.amap || (scoring.bilibili && scoring.bilibili.quotes && scoring.bilibili.quotes.length)) {
      aggHtml = '<div class="agg-card">';
      if (scoring.dianping) {
        aggHtml += '<div class="source-row"><span class="source-icon">&starf;</span>' +
          '<span class="source-content">大众点评：' + scoring.dianping + ' 分</span></div>';
      }
      if (scoring.amap) {
        aggHtml += '<div class="source-row"><span class="source-icon">&#128506;</span>' +
          '<span class="source-content">高德地图：' + scoring.amap + ' 分</span></div>';
      }
      if (scoring.bangdan_rank || scoring.bangdan_score) {
        aggHtml += '<div class="source-row"><span class="source-icon">🏆</span>' +
          '<span class="source-content">状元榜：' +
          (scoring.bangdan_rank ? '排名 #' + scoring.bangdan_rank : '') +
          (scoring.bangdan_score ? ' 评分 ' + scoring.bangdan_score : '') +
          '</span></div>';
      }
      if (scoring.bilibili && scoring.bilibili.quotes && scoring.bilibili.quotes.length) {
        aggHtml += '<div class="source-row"><span class="source-icon">&#9654;</span>' +
          '<span class="source-content">' + scoring.bilibili.quotes.map(function(q) { return '&ldquo;' + q + '&rdquo;'; }).join(' ') + '</span>' +
          '<span class="source-stats">' + (scoring.bilibili.views ? formatViews(scoring.bilibili.views) : '') + '</span></div>';
      }
      if (scoring.xhs_likes) {
        aggHtml += '<div class="source-row"><span class="source-icon">&#9829;</span>' +
          '<span class="source-content">小红书：' + formatNumber(scoring.xhs_likes) + ' 赞</span></div>';
      }
      if (scoring.weixin) {
        aggHtml += '<div class="source-row"><span class="source-icon">&#9998;</span>' +
          '<span class="source-content">公众号：' + scoring.weixin + '</span></div>';
      }
      aggHtml += '</div>';
    }

    // Links
    var linksHtml = '';
    if (Object.keys(links).length > 0) {
      linksHtml = '<div class="link-row">';
      if (links.dianping) linksHtml += '<a class="link-dianping" href="' + links.dianping + '" target="_blank">点评</a>';
      if (links.bilibili) linksHtml += '<a class="link-bilibili" href="' + links.bilibili + '" target="_blank">B站</a>';
      if (links.xhs) linksHtml += '<a class="link-xhs" href="' + links.xhs + '" target="_blank">小红书</a>';
      if (links.weixin) linksHtml += '<a class="link-weixin" href="' + links.weixin + '" target="_blank">公众号</a>';
      linksHtml += '</div>';
    }

    // Tier name for display
    var tierName = getTierName(tiers, budgetKey);

    cardsHtml += '<div class="restaurant-card">' +
      '<div class="rank-badge ' + rankClass + '">' + rank + '</div>' +
      '<div class="card-header">' +
        '<div class="name">' + name +
          (tierName ? ' &rarr; <span style="color:var(--accent)">' + tierName + '</span>' : '') +
        '</div>' +
        '<div class="subtitle">' +
          (cuisine ? '<span>' + cuisine + '</span>' : '') +
          (district ? '<span>' + district + '</span>' : '') +
          (address ? '<span>' + address + '</span>' : '') +
          '<span class="conf-tag ' + confClass + '">' + confLabel + '置信度</span>' +
          (pricePerPerson ? ' <span style="font-weight:600">&yen;' + pricePerPerson + '/人</span>' : '') +
        '</div>' +
      '</div>' +
      scoreGridHtml +
      mustTryHtml +
      aggHtml +
      featuresHtml +
      linksHtml +
      '</div>';
  }
  document.getElementById('ranking-list').innerHTML = cardsHtml;

  // Restaurant table
  var tbody = '';
  for (var j = 0; j < restaurants.length; j++) {
    var rt = restaurants[j];
    var rtLinks = rt.links || {};
    var rtLinksStr = '';
    if (rtLinks.dianping) rtLinksStr += '<a href="' + rtLinks.dianping + '" target="_blank" style="color:var(--accent);text-decoration:none;margin-right:6px;font-weight:600">点评</a>';
    if (rtLinks.bilibili) rtLinksStr += '<a href="' + rtLinks.bilibili + '" target="_blank" style="color:#d44a6e;text-decoration:none;margin-right:6px;font-weight:600">B站</a>';
    if (rtLinks.xhs) rtLinksStr += '<a href="' + rtLinks.xhs + '" target="_blank" style="color:#d43939;text-decoration:none;font-weight:600">小红书</a>';
    var rtConf = rt.confidence || '';
    var rtConfClass = rtConf === 'high' ? 'conf-high' : (rtConf === 'medium' ? 'conf-medium' : '');
    var rtConfLabel = rtConf === 'high' ? '高' : (rtConf === 'medium' ? '中' : '低');
    var rtScoring = rt.scoring || {};
    var rtRating = rtScoring.dianping ? '&starf;' + rtScoring.dianping : (rtScoring.amap ? '&starf;' + rtScoring.amap : '-');
    var rtPrice = rt.price_per_person || '-';
    tbody += '<tr>' +
      '<td><strong>' + (rt.name || '') + '</strong><br><span style="font-size:13px;color:var(--muted)">' + (rt.district || rt.cuisine || '') + '</span></td>' +
      '<td>' + rtRating + '</td>' +
      '<td>&yen;' + rtPrice + '</td>' +
      '<td class="' + rtConfClass + '">' + rtConfLabel + '</td>' +
      '<td>' + rtLinksStr + '</td>' +
      '</tr>';
  }
  document.getElementById('restaurant-table').innerHTML = tbody;

  // Footer
  document.getElementById('source-list').textContent = (d.sources || []).join(' &middot; ');
  document.getElementById('gen-time').textContent = new Date().toISOString().slice(0, 16).replace('T', ' ');
}

function switchBudget(level) {
  var btns = document.querySelectorAll('#budget-bar button');
  var levels = ['economy', 'standard', 'premium'];
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active-budget', levels[i] === level);
  }
  currentBudget = level;
  render();
}

function getTierPrice(tiers, level) {
  if (!tiers || !tiers[level]) return null;
  return tiers[level].price || null;
}

function getTierName(tiers, level) {
  if (!tiers || !tiers[level]) return null;
  return tiers[level].name || null;
}

function formatNumber(n) {
  if (typeof n !== 'number') return n;
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

function formatViews(n) {
  if (typeof n !== 'number') return '';
  if (n >= 10000) return (n / 10000).toFixed(1) + '万 播放';
  return n + ' 播放';
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
